<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <title>TechFix - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2b0a3d, #6a0dad);
    }

    .login-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .login-container h1 {
      margin-bottom: 10px;
      font-size: 28px;
      color: #d8b4ff;
    }

    .login-container p {
      font-size: 14px;
      margin-bottom: 25px;
      opacity: 0.8;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-group label {
      font-size: 13px;
      margin-bottom: 5px;
      display: block;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .input-group input::placeholder {
      color: #ccc;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #a855f7;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .login-btn:hover {
      background: #9333ea;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h1>TechFix</h1>
    <p>Sistema de Gestão de Reparações</p>

    <form onsubmit="login(event)">
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="exemplo@techfix.pt" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="palavra-chave" required>
      </div>

      <button class="login-btn">Entrar</button>
    </form>

    <div class="footer">
      © 2026 TechFix
    </div>
  </div>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    // ✅ FIX: evitar conflito de variável "supabase"
    window.supabaseClient = window.supabase.createClient(
      "https://tfhpjdkoisggiroxcmpu.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmaHBqZGtvaXNnZ2lyb3hjbXB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MTM3OTQsImV4cCI6MjA4NzA4OTc5NH0.b_IGSSodOiC_WDXZJw0Dz78Hx3IGGhxHG4cTbhVNPDQ"
    );

    async function login(event) {
      event.preventDefault();

      const email = document.querySelector("input[type='email']").value;
      const password = document.querySelector("input[type='password']").value;

      const { data, error } = await window.supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert("Erro no login");
        return;
      }

      const user = data.user;

      const { data: profile } = await window.supabaseClient
        .from("profiles")
        .select("role")
        .eq("id", user.id)
        .single();

      if (!profile) {
        alert("Perfil não encontrado");
        return;
      }

      if (profile.role === "admin") {
        window.location.href = "admin.html";
      } 
      else if (profile.role === "funcionario") {
        window.location.href = "funcionario.html";
      } 
      else {
        window.location.href = "cliente.html";
      }
    }
  </script>

</body>
</html>
