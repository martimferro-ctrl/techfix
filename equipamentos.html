<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipamentos - TechFix</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #12041c, #2b0a3d, #5d1896);
  color: white;
  padding: 30px;
}

header {
  text-align: center;
  margin-bottom: 35px;
}

.logo {
  font-size: 45px;
  font-weight: bold;
  color: #d8b4fe;
}

.subtitulo {
  color: #d1c4e9;
  margin-top: 8px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.topo {
  display: flex;
  gap: 12px;
  margin-bottom: 25px;
  flex-wrap: wrap;
}

button, input {
  padding: 13px 16px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
}

button {
  background: #9333ea;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #a855f7;
}

input {
  flex: 1;
  min-width: 240px;
  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
  border: 1px solid rgba(255,255,255,0.1);
}

input::placeholder {
  color: #c4b5fd;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 22px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.25);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(168,85,247,0.12);
  border-color: rgba(168,85,247,0.35);
}

.card h3 {
  color: #f3e8ff;
  margin-bottom: 14px;
  font-size: 22px;
}

.card p {
  color: #ddd6fe;
  margin-bottom: 8px;
  line-height: 1.5;
}

.estado {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: bold;
  margin-top: 5px;
}

.pendente,
.recebido {
  background: gray;
}

.em_diagnostico {
  background: #3498db;
}

.em_reparacao {
  background: #f1c40f;
  color: black;
}

.concluido {
  background: #2ecc71;
}

.entregue {
  background: #27ae60;
}

.cancelado {
  background: #e74c3c;
}

.vazio {
  text-align: center;
  padding: 30px;
  color: #d1c4e9;
}
</style>
</head>

<body>

<header>
  <div class="logo">TechFix</div>
  <div class="subtitulo">Lista de Equipamentos</div>
</header>

<div class="container">

  <div class="topo">
    <button onclick="window.location.href='funcionario.html'">Voltar</button>
    <input type="text" id="pesquisa" placeholder="Pesquisar equipamento, marca ou modelo...">
  </div>

  <div class="grid" id="listaEquipamentos"></div>

</div>

<script type="module">
import { supabase } from './js/supabaseClient.js'
import { checkUser } from './js/auth.js'

checkUser("funcionario")

const lista = document.getElementById("listaEquipamentos")
const pesquisa = document.getElementById("pesquisa")

let equipamentos = []

function classeEstado(estado) {
  if (!estado) return ""

  return estado
    .toLowerCase()
    .replaceAll(" ", "_")
    .replaceAll("ç", "c")
    .replaceAll("ã", "a")
}

async function carregarEquipamentos() {
  const { data, error } = await supabase
    .from("reparacoes")
    .select("*")
    .order("data_entrada", { ascending: false })

  if (error) {
    console.error(error)
    lista.innerHTML = "<p class='vazio'>Erro ao carregar equipamentos.</p>"
    return
  }

  equipamentos = data || []
  mostrarEquipamentos(equipamentos)
}

function mostrarEquipamentos(dados) {
  lista.innerHTML = ""

  if (dados.length === 0) {
    lista.innerHTML = "<p class='vazio'>Nenhum equipamento encontrado.</p>"
    return
  }

  dados.forEach(rep => {
    lista.innerHTML += `
      <div class="card">
        <h3>${rep.equipamento || "Equipamento sem nome"}</h3>

        <p><strong>Código:</strong> ${rep.codigo || "-"}</p>
        <p><strong>Marca:</strong> ${rep.marca || "Sem marca"}</p>
        <p><strong>Modelo:</strong> ${rep.modelo || "Sem modelo"}</p>
        <p><strong>Número de série:</strong> ${rep.numero_serie || "Não indicado"}</p>
        <p><strong>Problema:</strong> ${rep.problema || "Sem descrição"}</p>

        <span class="estado ${classeEstado(rep.estado)}">
          ${rep.estado || "Sem estado"}
        </span>
      </div>
    `
  })
}

pesquisa.addEventListener("input", () => {
  const texto = pesquisa.value.toLowerCase()

  const filtrados = equipamentos.filter(rep => {
    const conteudo = `
      ${rep.equipamento || ""}
      ${rep.marca || ""}
      ${rep.modelo || ""}
      ${rep.numero_serie || ""}
      ${rep.codigo || ""}
    `.toLowerCase()

    return conteudo.includes(texto)
  })

  mostrarEquipamentos(filtrados)
})

carregarEquipamentos()
</script>

</body>
</html>
