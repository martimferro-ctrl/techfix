<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>TechFix - Admin</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #2b0a3d, #6a0dad);
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  background: rgba(0,0,0,0.2);
}

.container {
  padding: 30px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<header>Painel de Admin - TechFix</header>

<div class="container">
  <div class="card" id="btnUsers">Gerir utilizadores</div>
  <div class="card" id="btnRepairs">Ver todas as reparações</div>
  <div class="card" id="btnReports">Relatórios do sistema</div>
</div>

<script type="module">
  import { checkUser } from './js/auth.js'

  checkUser("admin")

  document.getElementById("btnUsers").addEventListener("click", () => {
    window.location.href = "gerir-utilizadores.html"
  })

  document.getElementById("btnRepairs").addEventListener("click", () => {
    window.location.href = "reparacoes.html"
  })

  document.getElementById("btnReports").addEventListener("click", () => {
    window.location.href = "relatorios.html"
  })
</script>
</body>
</html>
