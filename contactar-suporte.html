<!-- contactar-suporte.html -->
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechFix - Suporte</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  min-height:100vh;
  background:
  linear-gradient(rgba(15,0,30,0.9), rgba(15,0,30,0.9)),
  url("fundo-techfix.png");
  background-size:cover;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  color:white;
  padding:30px 0;
}

.container{
  width:90%;
  max-width:600px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:30px;
  border:1px solid rgba(255,255,255,0.08);
}

.logo{
  text-align:center;
  font-size:50px;
  color:#d8b4fe;
  margin-bottom:10px;
  font-weight:bold;
}

.sub{
  text-align:center;
  margin-bottom:30px;
}

input, textarea{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#1e1033;
  color:white;
  margin-bottom:20px;
}

textarea{
  min-height:150px;
  resize:none;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#9333ea;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
  margin-bottom:12px;
}

button:hover{
  background:#a855f7;
}

.btn-voltar{
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
}

.status{
  margin-top:10px;
  text-align:center;
  margin-bottom:25px;
}

.historico-titulo{
  margin-top:25px;
  margin-bottom:15px;
  color:#d8b4fe;
  font-size:22px;
}

.pedido{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:15px;
  padding:18px;
  margin-bottom:15px;
}

.pedido h3{
  color:#f3e8ff;
  margin-bottom:10px;
}

.pedido p{
  margin-bottom:8px;
  line-height:1.5;
  color:#ddd6fe;
}

.estado{
  display:inline-block;
  padding:5px 12px;
  border-radius:20px;
  font-size:13px;
  font-weight:bold;
  margin-bottom:10px;
}

.aberto{
  background:#e74c3c;
}

.analise{
  background:#f1c40f;
  color:black;
}

.resolvido{
  background:#2ecc71;
}

.sem-resposta{
  color:#c4b5fd;
  font-style:italic;
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">TechFix</div>
  <div class="sub">Contactar Suporte</div>

  <input type="text" id="assunto" placeholder="Assunto">

  <textarea id="mensagem" placeholder="Escreve aqui a tua mensagem..."></textarea>

  <button id="btnEnviar">
    Enviar Mensagem
  </button>

  <button class="btn-voltar" onclick="window.location.href='cliente.html'">
    Voltar
  </button>

  <div class="status" id="status"></div>

  <h2 class="historico-titulo">As tuas mensagens</h2>

  <div id="listaMensagens"></div>

</div>

<script type="module">
import { supabase } from "./js/supabaseClient.js"
import { checkUser } from "./js/auth.js"

checkUser("cliente")

const assuntoInput = document.getElementById("assunto")
const mensagemInput = document.getElementById("mensagem")
const statusDiv = document.getElementById("status")
const listaMensagens = document.getElementById("listaMensagens")

function classeEstado(estado) {
  if (estado === "Aberto" || estado === "aberto") return "aberto"
  if (estado === "Em análise" || estado === "em análise") return "analise"
  if (estado === "Resolvido" || estado === "resolvido") return "resolvido"

  return "aberto"
}

async function obterUser() {
  const { data: sessionData } = await supabase.auth.getSession()

  if (!sessionData.session) {
    window.location.href = "login.html"
    return null
  }

  return sessionData.session.user
}

async function carregarMensagens() {
  const user = await obterUser()

  if (!user) return

  const { data, error } = await supabase
    .from("suporte")
    .select("*")
    .eq("cliente_id", user.id)
    .order("created_at", { ascending: false })

  if (error) {
    console.error(error)
    listaMensagens.innerHTML = "<p>Erro ao carregar mensagens.</p>"
    return
  }

  listaMensagens.innerHTML = ""

  if (!data || data.length === 0) {
    listaMensagens.innerHTML = "<p>Ainda não enviaste nenhuma mensagem.</p>"
    return
  }

  data.forEach(pedido => {
    listaMensagens.innerHTML += `
      <div class="pedido">
        <h3>${pedido.assunto || "Sem assunto"}</h3>

        <span class="estado ${classeEstado(pedido.estado)}">
          ${pedido.estado || "Aberto"}
        </span>

        <p><strong>A tua mensagem:</strong></p>
        <p>${pedido.mensagem || "Sem mensagem"}</p>

        <p><strong>Resposta da TechFix:</strong></p>
        <p class="${pedido.resposta ? "" : "sem-resposta"}">
          ${pedido.resposta || "Ainda sem resposta."}
        </p>

        <p><strong>Data:</strong> ${pedido.created_at || "-"}</p>
      </div>
    `
  })
}

document.getElementById("btnEnviar").addEventListener("click", async () => {
  const assunto = assuntoInput.value.trim()
  const mensagem = mensagemInput.value.trim()

  if (!assunto || !mensagem) {
    statusDiv.innerHTML = "Preenche todos os campos."
    return
  }

  const user = await obterUser()

  if (!user) return

  const { error } = await supabase
    .from("suporte")
    .insert([
      {
        cliente_id: user.id,
        assunto: assunto,
        mensagem: mensagem,
        estado: "Aberto"
      }
    ])

  if (error) {
    statusDiv.innerHTML = "Erro ao enviar mensagem."
    console.error(error)
    return
  }

  statusDiv.innerHTML = "Mensagem enviada com sucesso."

  assuntoInput.value = ""
  mensagemInput.value = ""

  carregarMensagens()
})

carregarMensagens()
</script>

</body>
</html>
