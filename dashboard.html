<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Admin - TechFix</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #12041c, #2b0a3d, #5d1896);
  color: white;
  padding: 30px;
}

header {
  text-align: center;
  margin-bottom: 35px;
}

.logo {
  font-size: 45px;
  font-weight: bold;
  color: #d8b4fe;
}

.subtitulo {
  color: #d1c4e9;
  margin-top: 8px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 35px;
}

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 25px;
  text-align: center;
}

.card h2 {
  font-size: 36px;
  color: #d8b4fe;
  margin-bottom: 8px;
}

.card p {
  color: #ddd;
}

.tabela {
  background: rgba(255,255,255,0.08);
  border-radius: 18px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  text-align: left;
}

th {
  background: rgba(0,0,0,0.25);
  color: #d8b4fe;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #9333ea;
  color: white;
  cursor: pointer;
  margin-bottom: 25px;
}

button:hover {
  background: #a855f7;
}

.estado {
  padding: 6px 12px;
  border-radius: 20px;
  background: rgba(168,85,247,0.25);
}

@media(max-width: 800px) {
  body {
    padding: 15px;
  }

  .tabela {
    overflow-x: auto;
  }

  table {
    min-width: 700px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">TechFix</div>
  <div class="subtitulo">Dashboard de Administração</div>
</header>

<div class="container">

  <button onclick="window.location.href='admin.html'">
    Voltar ao painel admin
  </button>

  <div class="cards">
    <div class="card">
      <h2 id="totalReparacoes">0</h2>
      <p>Total de reparações</p>
    </div>

    <div class="card">
      <h2 id="pendentes">0</h2>
      <p>Pendentes</p>
    </div>

    <div class="card">
      <h2 id="emReparacao">0</h2>
      <p>Em reparação</p>
    </div>

    <div class="card">
      <h2 id="concluidas">0</h2>
      <p>Concluídas</p>
    </div>

    <div class="card">
      <h2 id="clientes">0</h2>
      <p>Clientes registados</p>
    </div>
  </div>

  <h2 style="margin-bottom: 15px;">Últimas reparações</h2>

  <div class="tabela">
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Equipamento</th>
          <th>Marca</th>
          <th>Modelo</th>
          <th>Estado</th>
          <th>Data</th>
        </tr>
      </thead>

      <tbody id="ultimasReparacoes"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { supabase } from './js/supabaseClient.js'
import { checkUser } from './js/auth.js'

checkUser("admin")

async function carregarDashboard() {
  const { data: reparacoes, error: erroRep } = await supabase
    .from("reparacoes")
    .select("*")
    .order("data_entrada", { ascending: false })

  if (erroRep) {
    console.error(erroRep)
    return
  }

  const { data: clientes, error: erroClientes } = await supabase
    .from("profiles")
    .select("*")
    .eq("role", "cliente")

  if (erroClientes) {
    console.error(erroClientes)
  }

  document.getElementById("totalReparacoes").textContent = reparacoes.length

  document.getElementById("pendentes").textContent =
    reparacoes.filter(r => r.estado === "pendente" || r.estado === "Recebido").length

  document.getElementById("emReparacao").textContent =
    reparacoes.filter(r => r.estado === "em_reparacao" || r.estado === "Em reparação").length

  document.getElementById("concluidas").textContent =
    reparacoes.filter(r => r.estado === "concluido" || r.estado === "Concluído").length

  document.getElementById("clientes").textContent = clientes ? clientes.length : 0

  const tbody = document.getElementById("ultimasReparacoes")
  tbody.innerHTML = ""

  reparacoes.slice(0, 6).forEach(rep => {
    tbody.innerHTML += `
      <tr>
        <td>${rep.codigo || "-"}</td>
        <td>${rep.equipamento || "-"}</td>
        <td>${rep.marca || "-"}</td>
        <td>${rep.modelo || "-"}</td>
        <td><span class="estado">${rep.estado || "-"}</span></td>
        <td>${rep.data_entrada || "-"}</td>
      </tr>
    `
  })
}

carregarDashboard()
</script>

</body>
</html>
